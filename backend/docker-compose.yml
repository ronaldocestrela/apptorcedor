services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_password123 -C -Q 'SELECT 1' -b || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MasterDb: "Server=sqlserver,1433;Database=SocioTorcedor_Master;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
      Jwt__Issuer: SocioTorcedor
      Jwt__Audience: SocioTorcedor
      Jwt__SigningKey: "CHANGE_ME_DEV_ONLY_MIN_32_CHARS_HMACSHA256_KEY!"
      Jwt__AccessTokenMinutes: "120"
      Backoffice__ApiKey: "CHANGE_ME_BACKOFFICE_API_KEY"
      Payments__MemberWebhookSecret: "CHANGE_ME_MEMBER_PAYMENTS_WEBHOOK_SECRET"
    depends_on:
      sqlserver:
        condition: service_healthy

name: CI

on:
  push:
    branches: [single-tenant]
  pull_request:
    branches: [single-tenant]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet restore tests/AppTorcedor.Api.Tests/AppTorcedor.Api.Tests.csproj
          dotnet restore tests/AppTorcedor.Identity.Tests/AppTorcedor.Identity.Tests.csproj
          dotnet restore tests/AppTorcedor.Application.Tests/AppTorcedor.Application.Tests.csproj

      - name: Build
        run: |
          dotnet build tests/AppTorcedor.Api.Tests/AppTorcedor.Api.Tests.csproj -c Release --no-restore
          dotnet build tests/AppTorcedor.Identity.Tests/AppTorcedor.Identity.Tests.csproj -c Release --no-restore
          dotnet build tests/AppTorcedor.Application.Tests/AppTorcedor.Application.Tests.csproj -c Release --no-restore

      - name: Test
        run: |
          dotnet test tests/AppTorcedor.Api.Tests/AppTorcedor.Api.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/AppTorcedor.Identity.Tests/AppTorcedor.Identity.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/AppTorcedor.Application.Tests/AppTorcedor.Application.Tests.csproj -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-cd-tooling:
    name: Deploy/CD tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax (deploy scripts)
        run: |
          bash -n deploy/vps/deploy.sh
          bash -n deploy/vps/build-and-deploy.sh
          bash -n deploy/ci/wait-github-ci.sh

      - name: Python (gate CI / Jenkins helper)
        run: python3 -m unittest discover -s deploy/ci -p 'test_*.py' -v

  docker-compose:
    name: Docker Compose (config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose (API + web)
        run: docker compose --env-file .env.compose.example config --quiet

  trigger-jenkins:
    name: Trigger Jenkins deploy
    needs: [backend, frontend, deploy-cd-tooling, docker-compose]
    if: github.ref == 'refs/heads/single-tenant' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins build
        run: |
          curl -fsS -X POST \
            "${JENKINS_URL}/job/${JENKINS_JOB_NAME}/build?token=${JENKINS_BUILD_TOKEN}" \
            -u "${JENKINS_USER}:${JENKINS_API_TOKEN}"
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_JOB_NAME: ${{ secrets.JENKINS_JOB_NAME }}
          JENKINS_BUILD_TOKEN: ${{ secrets.JENKINS_BUILD_TOKEN }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}

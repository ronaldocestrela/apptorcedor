name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  build-test-openapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore SocioTorcedor.sln

      - name: Build
        run: dotnet build SocioTorcedor.sln -c Release --no-restore

      - name: Test
        run: dotnet test SocioTorcedor.sln -c Release --no-build --verbosity normal

      - name: Export OpenAPI example (openapi.json)
        working-directory: backend/src/Host/SocioTorcedor.Api
        env:
          Database__ApplyMigrationsAtStartup: "false"
          EXPOSE_OPENAPI_JSON: "true"
          ASPNETCORE_ENVIRONMENT: Production
          OPENAPI_PORT: "5055"
        run: |
          set -euo pipefail
          ./bin/Release/net10.0/SocioTorcedor.Api --urls "http://127.0.0.1:${OPENAPI_PORT}" &
          PID=$!
          trap 'kill ${PID} 2>/dev/null || true' EXIT
          for _ in $(seq 1 90); do
            if curl -sf "http://127.0.0.1:${OPENAPI_PORT}/health" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf "http://127.0.0.1:${OPENAPI_PORT}/health" >/dev/null
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          curl -sSf "http://127.0.0.1:${OPENAPI_PORT}/swagger/v1/swagger.json" \
            -o "${GITHUB_WORKSPACE}/artifacts/openapi.json"
          jq -e '.openapi | startswith("3.")' "${GITHUB_WORKSPACE}/artifacts/openapi.json" >/dev/null
          jq -e '.info.title == "Socio Torcedor API"' "${GITHUB_WORKSPACE}/artifacts/openapi.json" >/dev/null

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-example
          path: artifacts/openapi.json
          if-no-files-found: error
